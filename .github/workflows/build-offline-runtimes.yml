name: Build offline runtimes and Windows bundle

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "offline/**"
      - "scripts/build_offline_package.py"
      - "examples/atg8-yta7-job.json"
      - "src/**"
      - "pyproject.toml"
  pull_request:
    paths:
      - "offline/**"
      - "scripts/build_offline_package.py"
      - "examples/atg8-yta7-job.json"
      - "src/**"
      - "pyproject.toml"

env:
  PPI_SCOUT_VERSION: "0.5.0"

permissions:
  contents: read

jobs:
  runtime:
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS arm64
            os: macos-14
            archive: cpython-3.12.13+20260623-aarch64-apple-darwin-install_only.tar.gz
            python_sha256: 3724aa4dafb5f7b6c2cf98e89914e4248dc6bd2fe40407df4a2d73de99615f16
            output: ppi-scout-runtime-macos-arm64.tar.gz
            boltz_spec: boltz==2.2.1
          - label: Linux x86_64 for Windows WSL2
            os: ubuntu-24.04
            archive: cpython-3.12.13+20260623-x86_64-unknown-linux-gnu-install_only.tar.gz
            python_sha256: 9fa869d69be54f6b8eeae64272fbd9bb0646e0e1a8da9d80e51ba5a3bee48930
            output: ppi-scout-runtime-linux-x86_64.tar.gz
            boltz_spec: boltz[cuda]==2.2.1
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Download pinned relocatable CPython
        env:
          ARCHIVE: ${{ matrix.archive }}
          EXPECTED: ${{ matrix.python_sha256 }}
        run: |
          set -euo pipefail
          url="https://github.com/astral-sh/python-build-standalone/releases/download/20260623/${ARCHIVE//+/%2B}"
          curl -fL --retry 3 -o "$ARCHIVE" "$url"
          actual="$(shasum -a 256 "$ARCHIVE" | awk '{print $1}')"
          test "$actual" = "$EXPECTED"
          mkdir runtime
          tar -xzf "$ARCHIVE" -C runtime

      - name: Install pinned local inference stack
        env:
          BOLTZ_SPEC: ${{ matrix.boltz_spec }}
        run: |
          set -euo pipefail
          runtime/python/bin/python3 -m pip install --disable-pip-version-check --no-cache-dir "$BOLTZ_SPEC" .
          PATH="$PWD/runtime/python/bin:$PATH" runtime/python/bin/python3 -m ppi_scout.offline doctor >/dev/null
          runtime/python/bin/python3 - <<'PY'
          import boltz
          import ppi_scout
          import torch
          print("ppi-scout", ppi_scout.__version__)
          print("boltz", getattr(boltz, "__version__", "2.2.1"))
          print("torch", torch.__version__)
          PY

      - name: Archive and split for GitHub limits
        env:
          OUTPUT: ${{ matrix.output }}
        run: |
          set -euo pipefail
          tar -czf "$OUTPUT" -C runtime python
          mkdir dist
          shasum -a 256 "$OUTPUT" > "dist/$OUTPUT.sha256"
          split -b 1900m -d -a 3 "$OUTPUT" "dist/$OUTPUT.part-"
          shasum -a 256 dist/*.part-* > "dist/$OUTPUT.parts.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: dist/
          compression-level: 0
          retention-days: 7

  windows-offline:
    name: Complete Windows offline bundle
    needs: runtime
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Free space for the multi-gigabyte verified payload
        run: |
          sudo rm -rf /usr/local/lib/android /opt/ghc
          df -h .

      - name: Download the verified Linux runtime parts
        uses: actions/download-artifact@v4
        with:
          name: ppi-scout-runtime-linux-x86_64.tar.gz
          path: runtime-parts

      - name: Reconstruct and verify the Linux runtime
        run: |
          set -euo pipefail
          mkdir -p bundle/windows-wsl2-x64
          cat runtime-parts/ppi-scout-runtime-linux-x86_64.tar.gz.part-* \
            > bundle/windows-wsl2-x64/ppi-scout-runtime-linux-x86_64.tar.gz
          expected="$(awk 'NR == 1 {print $1}' runtime-parts/ppi-scout-runtime-linux-x86_64.tar.gz.sha256)"
          actual="$(sha256sum bundle/windows-wsl2-x64/ppi-scout-runtime-linux-x86_64.tar.gz | awk '{print $1}')"
          test "$actual" = "$expected"
          rm -rf runtime-parts

      - name: Download and verify the pinned Boltz 2 model payload
        run: |
          set -euo pipefail
          mkdir -p bundle/models
          cp offline/models/SHA256SUMS bundle/models/
          download() {
            destination="$1"
            primary="$2"
            fallback="${3:-}"
            if ! curl -fL --retry 5 --retry-all-errors -o "$destination" "$primary"; then
              test -n "$fallback"
              curl -fL --retry 5 --retry-all-errors -o "$destination" "$fallback"
            fi
          }
          download bundle/models/mols.tar \
            https://huggingface.co/boltz-community/boltz-2/resolve/main/mols.tar
          download bundle/models/boltz2_conf.ckpt \
            https://model-gateway.boltz.bio/boltz2_conf.ckpt \
            https://huggingface.co/boltz-community/boltz-2/resolve/main/boltz2_conf.ckpt
          download bundle/models/boltz2_aff.ckpt \
            https://model-gateway.boltz.bio/boltz2_aff.ckpt \
            https://huggingface.co/boltz-community/boltz-2/resolve/main/boltz2_aff.ckpt
          cd bundle/models
          sha256sum -c SHA256SUMS

      - name: Download and verify the official Ubuntu WSL2 root filesystem
        env:
          UBUNTU_WSL_BASE: https://cdimages.ubuntu.com/ubuntu-wsl/noble/daily-live/current
        run: |
          set -euo pipefail
          mkdir -p ubuntu-wsl
          curl -fL --retry 5 --retry-all-errors -o ubuntu-wsl/SHA256SUMS "$UBUNTU_WSL_BASE/SHA256SUMS"
          grep -E '[ *]noble-wsl-amd64\.wsl$' ubuntu-wsl/SHA256SUMS > ubuntu-wsl/rootfs.sha256
          curl -fL --retry 5 --retry-all-errors -o ubuntu-wsl/noble-wsl-amd64.wsl \
            "$UBUNTU_WSL_BASE/noble-wsl-amd64.wsl"
          cd ubuntu-wsl
          sha256sum -c rootfs.sha256
          tar -tf noble-wsl-amd64.wsl >/dev/null
          cd ..
          mv ubuntu-wsl/noble-wsl-amd64.wsl bundle/windows-wsl2-x64/ubuntu-rootfs.tar.gz
          rm -rf ubuntu-wsl

      - name: Assemble the versioned bundle tree and checksum manifest
        run: |
          set -euo pipefail
          mkdir -p bundle/jobs bundle/msas
          cp offline/windows/Run-PPI-Scout-Windows.cmd bundle/
          cp offline/windows/install-and-run.ps1 offline/windows/install-and-run.sh bundle/windows-wsl2-x64/
          cp offline/README.md bundle/README.md
          cp offline/msas/README.md bundle/msas/README.md
          cp examples/atg8-yta7-job.json bundle/jobs/current-job.json
          printf '%s\n' \
            "PPI Scout source commit: $GITHUB_SHA" \
            "PPI Scout version: $PPI_SCOUT_VERSION" \
            "Python standalone release: 20260623 / CPython 3.12.13" \
            "Boltz package and model format: 2.2.1" \
            "Model source: https://huggingface.co/boltz-community/boltz-2" \
            "Ubuntu WSL source: https://cdimages.ubuntu.com/ubuntu-wsl/noble/daily-live/current/noble-wsl-amd64.wsl" \
            > bundle/BUNDLE-SOURCES.txt
          (
            cd bundle
            find models windows-wsl2-x64 jobs msas -type f -print0 | sort -z | xargs -0 sha256sum
            sha256sum Run-PPI-Scout-Windows.cmd README.md BUNDLE-SOURCES.txt
          ) > bundle/BUNDLE-SHA256SUMS

      - name: Split into locally reconstructable Windows download parts
        run: |
          python scripts/build_offline_package.py \
            --bundle bundle \
            --output dist/PPI-Scout-Windows-Offline-v${PPI_SCOUT_VERSION} \
            --tag v${PPI_SCOUT_VERSION} \
            --windows-local \
            --remove-payloads-after-split
          ls -lh dist/PPI-Scout-Windows-Offline-v${PPI_SCOUT_VERSION}
          df -h .

      - name: Upload complete Windows offline bundle
        uses: actions/upload-artifact@v4
        with:
          name: PPI-Scout-Windows-Offline-v${{ env.PPI_SCOUT_VERSION }}
          path: dist/PPI-Scout-Windows-Offline-v${{ env.PPI_SCOUT_VERSION }}/
          compression-level: 0
          retention-days: 90

      - name: Publish the formal GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: v${{ env.PPI_SCOUT_VERSION }}
        run: |
          set -euo pipefail
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --draft \
              --target "$GITHUB_SHA" \
              --title "PPI Scout $TAG" \
              --notes-file ".github/release-notes/${TAG}.md"
          fi
          gh release upload "$TAG" \
            dist/PPI-Scout-Windows-Offline-v${PPI_SCOUT_VERSION}/* \
            --clobber
          gh release edit "$TAG" \
            --title "PPI Scout $TAG" \
            --notes-file ".github/release-notes/${TAG}.md" \
            --draft=false \
            --latest
